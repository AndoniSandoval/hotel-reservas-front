<div class="d-flex justify-content-center align-items-center vh-100 fondo-hotel">
  <form (ngSubmit)="onLogin()" class="p-5 bg-white rounded-2 shadow-lg" style="width: 450px; max-width: 90%; font-size: 1.1rem;">
    <h3 class="mb-5 text-center fw-bold titulo">Iniciar Sesión</h3>
    
    <div class="mb-4">
      <div class="input-group mb-3">
      <span class="input-group-text" id="basic-addon1"><i class="fa-regular fa-user"></i></span>
      <input [(ngModel)]="username" name="username" id="username" type="text" class="form-control" placeholder="Username" aria-label="Username" aria-describedby="basic-addon1" required>
    </div>

    </div>
    
    <div class="mb-4">
            <div class="input-group mb-3">
              <span class="input-group-text" id="basic-addon1">***</span>
              <input [(ngModel)]="password" name="password" id="password"  type="password" class="form-control" placeholder="Password" aria-label="Password" aria-describedby="basic-addon1" required>
            </div>
    </div>
    
    <button type="submit" class="btn btn btn-secondary btn-lg w-100 shadow-sm mt-4" 
            style="font-weight: 600; letter-spacing: 0.05em; transition: background-color 0.3s ease;">
      Iniciar Sesión
    </button>
    
    <p *ngIf="error" class="mt-4 text-danger text-center fw-semibold">{{ error }}</p>
  </form>
</div>
