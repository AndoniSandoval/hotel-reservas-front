<div class="container-fluid mt-4">
    <h2>Usuarios</h2>
    <div class="d-flex justify-content-between mb-3">
        <button class="btn btn-outline-secondary" (click)="toggleForm()"> 
            <i class="fa-solid fa-plus"></i>Registrar usuario
        </button>
    </div>
    <table class="table table-striped table-bordered mt-3">
  <thead class="table-dark">
    <tr class="text-center">
      <th scope="col">#</th>
      <th scope="col">Usuario</th>
      <th scope="col">Roles</th>
      <th scope="col">Acciones</th>
    </tr>
  </thead>
  <tbody>

    <tr class="text-center" *ngFor="let usuario of usuarios; let i = index">
        <!-- @for (item of usuarios; track $index) {
            <p>{{item.username}}</p>
        } -->

      <th scope="row">{{i+1}}</th>
      <td>{{usuario.username}}</td>
      <td><span *ngFor="let rol of usuario.roles" class="badge bg-primary">{{tranformarRol(rol)}}</span></td>
      <td>
        <span>
          <button class="btn btn-outline-primary btn-sm me-1 ms-1" (click)="editarUsuario(usuario)">
                <i class="fa-solid fa-pen"></i>Actualizar
            </button>

            <button class="btn btn-danger btn-sm me-1 ms-1" (click)="eliminarUsuario(usuario.username)">
                <i class="fa fa-trash"></i>Eliminar
            </button>

            
        </span>
    </td>
    </tr>

  </tbody>
</table>


<!-- Modal para registrar usuario -->

<div class="modal fade" #usuarioModalRef tabindex="-1" aria-labelledby="usuarioModalLabel" aria-hidden="true"> 
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-dark text-white">
        <h5 class="modal.title" id="usuarioModalLabel"> {{textoModal}} </h5>
          <button type="button" class="btn btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>

      <div class="modal-body">
        <form [formGroup]="usuarioForm" (ngSubmit)="onSubmit()" >
          <!-- Inicio bloque -->
          <div class="mb-4">
            <div class="input-group">
              <span class="input-group-text">
                <i class="fa-solid fa-user"></i>
              </span>
              <div class="form-floating">
                <input type="text" class="form-control" id="username" formControlName="username"
                  placeholder="Username" required>
                <label for="username">Username</label>
              </div>
            </div>
            
            <div *ngIf="usuarioForm.get('username')?.invalid && usuarioForm.get('username')?.touched"
            class="text-danger small mt-1">
            <span *ngIf="usuarioForm.get('username')?.errors?.['required']">El username es requerido</span>

            <span *ngIf="usuarioForm.get('username')?.errors?.['minlength']">Minimo 5 caracteres</span>

            <span *ngIf="usuarioForm.get('username')?.errors?.['maxlength']">Maximo 20 caracteres</span>
          
          </div>
          </div>
          <!-- fin bloque -->

          <!-- Inicio bloque -->
          <div class="mb-4">
            <div class="input-group">
              <span class="input-group-text">
                ***
              </span>
              <div class="form-floating">
                <input type="password" class="form-control" id="password" formControlName="password"
                  placeholder="Password" required>
                <label for="password">Password</label>
              </div>
            </div>
            
            <div *ngIf="usuarioForm.get('password')?.invalid && usuarioForm.get('password')?.touched"
            class="text-danger small mt-1">
            <span *ngIf="usuarioForm.get('password')?.errors?.['required']">El password es requerido</span>

            <span *ngIf="usuarioForm.get('password')?.errors?.['minlength']">Minimo 8 caracteres</span>
          
          </div>
          </div>
          <!-- fin bloque -->
           

          <div class="mb-3">
            <label for="roles" class="form-label">Roles</label>
            <select id="roles" class="form-select" formControlName="roles" multiple size="3">
              <option *ngFor="let rol of roles" [value]="rol">{{tranformarRol(rol)}}</option>
            </select>
            <div class="form-text">Manten precionada la tecla Crtl para seleccionar multiples</div>

            <div *ngIf="usuarioForm.get('roles')?.invalid && usuarioForm.get('roles')?.touched"
            class="text-dangersmall mt-1">
            <span *ngIf="usuarioForm.get('roles')?.errors?.['required']">El role es requerido</span>
          
          </div>

          <div class="text-center">
            <button type="submit" class="btn btn-success px-4" [disabled]="usuarioForm.invalid">
              <i class="fa fa-save"></i> Guardar
            </button>
          </div>
          </div>


        </form>
        
      </div>
    </div>
  </div>
</div>
</div>
